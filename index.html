function setEngine(e){
  transcriptEngine=e;
  ["Auto","Bunny","Assembly","Browser"].forEach(name=>{
    const btn=document.getElementById("eng"+name);
    if(btn) btn.classList.toggle("active",e===name.toLowerCase());
  });
  updateEngineUI();
}

function updateEngineUI(){
  const recBtn=document.getElementById("recBtn");
  const genBtn=document.getElementById("genBtn");
  const eng=resolveEngine();
  if(!recBtn||!genBtn) return;
  if(eng==="browser"){
    recBtn.style.display="inline-block";
    genBtn.style.display="none";
  } else {
    recBtn.style.display="none";
    genBtn.style.display="inline-block";
  }
  const labels={bunny:"Bunny Captions",assembly:"AssemblyAI",browser:"Browser Speech",none:"none configured"};
  document.getElementById("transcriptStatus").innerText="Active engine: "+(labels[eng]||eng);
}

function resolveEngine(){
  if(transcriptEngine==="auto"){
    if(videoSourceMode==="bunny" && bunnyVideoId && isBunnyConfigured()) return "bunny";
    if(isAssemblyConfigured()) return "assembly";
    return "browser";
  }
  return transcriptEngine;
}

function setSourceMode(mode){
  videoSourceMode=mode;
  ["Url","Upload","Bunny"].forEach(m=>{
    const btn=document.getElementById("src"+m+"Btn");
    const box=document.getElementById("src"+m+"Box");
    if(btn) btn.classList.toggle("active",mode===m.toLowerCase());
    if(box) box.style.display=mode===m.toLowerCase()?"block":"none";
  });
  updateEngineUI();
}

function handleVideoUpload(event){

  uploadedVideoFile=file;
  const info=document.getElementById("uploadInfo");
  info.style.display="block";
  const isMov=/\.mov$/i.test(file.name);
  const movNote=isMov?'<br><small>📱 .mov detected — if it doesn\'t play, use Cloud Upload instead.</small>':'';
  info.innerHTML='✅ Loaded: <b>'+file.name+'</b> ('+(file.size/1024/1024).toFixed(1)+' MB) — preview only.'+movNote;
  const box=document.getElementById("builderVideo");
  const mime=file.type||(isMov?"video/quicktime":"video/mp4");
  box.innerHTML='<video id="builderPlayer" controls><source src="'+uploadedVideoURL+'" type="'+mime+'"></video>';
  builderPlayer=document.getElementById("builderPlayer");
  builderPlayer.addEventListener("error",()=>{
    info.innerHTML+='<br><span style="color:#991b1b;">⚠️ This file can\'t play in your browser. Try Cloud Upload — Bunny will convert it automatically.</span>';
  });
  ytReady=true;
  ytPlayer=null;
}

async function handleBunnyUpload(event){
  const file=event.target.files[0];
  if(!file) return;
  if(!isBunnyConfigured()){ alert("Cloud upload is not configured."); return; }

  const cfg=window.BUNNY_CONFIG;
  const status=document.getElementById("cloudStatus");
  const progressWrap=document.getElementById("progressWrap");
  const progressBar=document.getElementById("progressBar");
  progressWrap.style.display="block";
  progressBar.style.width="0%";
  progressBar.innerText="0%";
  status.innerHTML="⏳ Creating video entry...";

  try{
    const createRes=await fetch("https://video.bunnycdn.com/library/"+cfg.LIBRARY_ID+"/videos",{
      method:"POST",
      headers:{"Content-Type":"application/json","AccessKey":cfg.API_KEY},
      body:JSON.stringify({title:file.name})
    });
    if(!createRes.ok) throw new Error("Failed to create video entry: "+createRes.status);
    const created=await createRes.json();
    const guid=created.guid;
    status.innerHTML='⏳ Uploading "'+file.name+'"...';

    await new Promise((resolve,reject)=>{
      const xhr=new XMLHttpRequest();
      xhr.open("PUT","https://video.bunnycdn.com/library/"+cfg.LIBRARY_ID+"/videos/"+guid);
      xhr.setRequestHeader("AccessKey",cfg.API_KEY);
      xhr.upload.onprogress=(e)=>{
        if(e.lengthComputable){
          const pct=Math.round((e.loaded/e.total)*100);
          progressBar.style.width=pct+"%";
          progressBar.innerText=pct+"%";
        }
      };
      xhr.onload=()=>{
        if(xhr.status>=200 && xhr.status<300) resolve();
        else reject(new Error("Upload failed: "+xhr.status));
      };
      xhr.onerror=()=>reject(new Error("Network error"));
      xhr.send(file);
    });

    bunnyVideoId=guid;
    bunnyEmbedUrl="https://iframe.mediadelivery.net/embed/"+cfg.LIBRARY_ID+"/"+guid;
    bunnyDirectUrl="https://"+cfg.CDN_HOST+"/"+guid+"/play_720p.mp4";
    status.innerHTML='<span class="upload-success">✅ Uploaded! Bunny is converting and (if enabled) auto-transcribing — usually ready in 1-3 minutes.</span>';
    progressBar.style.width="100%";
    progressBar.innerText="Done";
    renderBunnyVideo();
    updateEngineUI();
  }catch(err){
    console.error(err);
    status.innerHTML='<span class="upload-error">❌ '+err.message+'</span>';
    progressWrap.style.display="none";
  }
}

function getTime(){
  if(!builderPlayer||!ytReady) return 0;
  return builderPlayer.currentTime!==undefined ? builderPlayer.currentTime : (builderPlayer.getCurrentTime?builderPlayer.getCurrentTime():0);

function seekTo(time){
  if(!builderPlayer||!ytReady) return;
  if(typeof builderPlayer.seekTo==="function"){
    builderPlayer.seekTo(time,true);
    if(builderPlayer.playVideo) builderPlayer.playVideo();
  } else if(builderPlayer.currentTime!==undefined){
    builderPlayer.currentTime=time;
    builderPlayer.play();
  }
}

function formatTime(sec){
  sec=Math.floor(sec);
  const m=Math.floor(sec/60), s=sec%60;
  return m+":"+(s<10?"0":"")+s;
}

/* ============ TRANSCRIPT ENGINES ============ */

async function generateTranscript(){
  const eng=resolveEngine();
  const status=document.getElementById("transcriptStatus");
  if(eng==="bunny") return generateBunnyTranscript();
  if(eng==="assembly") return generateAssemblyTranscript();

/* 🐰 Bunny Stream Captions */
async function generateBunnyTranscript(){
  const status=document.getElementById("transcriptStatus");
  if(!bunnyVideoId){ alert("Upload a video via Cloud Upload first."); return; }
  if(!isBunnyConfigured()){ alert("Bunny not configured."); return; }
  const cfg=window.BUNNY_CONFIG;
  status.innerText="⏳ Fetching Bunny captions...";

  try{
    // First, request transcription if not auto-enabled
    const url="https://video.bunnycdn.com/library/"+cfg.LIBRARY_ID+"/videos/"+bunnyVideoId;
    const res=await fetch(url,{headers:{"AccessKey":cfg.API_KEY}});
    if(!res.ok) throw new Error("Could not fetch video info");
    const info=await res.json();

    if(!info.captions || info.captions.length===0){
      status.innerText="⏳ No captions yet. Requesting transcription...";
      const transRes=await fetch(url+"/transcribe",{
        method:"POST",
        headers:{"AccessKey":cfg.API_KEY,"Content-Type":"application/json"},
        body:JSON.stringify({language:"en",force:true})
      });
      if(!transRes.ok){
        status.innerHTML='<span class="upload-error">Bunny returned '+transRes.status+'. Make sure transcription is enabled in your Bunny library Settings → Transcription.</span>';
        return;
      }
      status.innerText="⏳ Transcription started — usually takes 1-3 min. Please wait, then click Generate Transcript again.";
      return;
    }

    // Use the first available caption track
    const cap=info.captions[0];
    const captionUrl="https://"+cfg.CDN_HOST+"/"+bunnyVideoId+"/captions/"+cap.srclang+".vtt";
    const vttRes=await fetch(captionUrl);
    if(!vttRes.ok) throw new Error("Could not load caption file");
    const vttText=await vttRes.text();

    transcriptData=parseVTT(vttText);
    renderTranscript();
    status.innerText="✅ Loaded "+transcriptData.length+" caption segments from Bunny.";
  }catch(err){
    console.error(err);
    status.innerHTML='<span class="upload-error">❌ '+err.message+'</span>';
  }
}

function parseVTT(text){
  const lines=text.split(/\r?\n/);
  const out=[];
  let i=0;
  while(i<lines.length){
    const line=lines[i].trim();
    const m=line.match(/^(\d{1,2}):(\d{2}):(\d{2})[\.,](\d{3})\s*-->\s*(\d{1,2}):(\d{2}):(\d{2})[\.,](\d{3})/);
    if(m){
      const start=(+m[1])*3600+(+m[2])*60+(+m[3])+(+m[4])/1000;
      i++;
      let textLines=[];
      while(i<lines.length && lines[i].trim()!==""){
        textLines.push(lines[i].trim());
        i++;
      }
      const segText=textLines.join(" ").replace(/<[^>]+>/g,"").trim();
      if(segText) out.push({time:start,text:segText});
    }
    i++;
  }
  return out;
}

/* 🎯 AssemblyAI */
async function generateAssemblyTranscript(){
  const status=document.getElementById("transcriptStatus");
  if(!isAssemblyConfigured()){ alert("AssemblyAI not configured. Add your API key to ASSEMBLYAI_CONFIG."); return; }

  let audioUrl=null;
  if(videoSourceMode==="bunny" && bunnyDirectUrl){
    audioUrl=bunnyDirectUrl;
  } else if(videoSourceMode==="url"){
    const u=document.getElementById("videoUrl").value;
    if(u.includes("youtube")){ alert("AssemblyAI can't transcribe YouTube directly. Upload via Cloud Upload, or use Browser engine."); return; }
    audioUrl=u;
  } else if(videoSourceMode==="upload" && uploadedVideoFile){
    status.innerText="⏳ Uploading file to AssemblyAI...";
    audioUrl=await assemblyUploadFile(uploadedVideoFile);
  }
  if(!audioUrl){ alert("No video available."); return; }

  status.innerText="⏳ Submitting to AssemblyAI...";
  try{
    const submit=await fetch("https://api.assemblyai.com/v2/transcript",{
      method:"POST",
      headers:{"Authorization":window.ASSEMBLYAI_CONFIG.API_KEY,"Content-Type":"application/json"},
      body:JSON.stringify({audio_url:audioUrl,punctuate:true,format_text:true})
    });
    const job=await submit.json();
    if(!job.id) throw new Error(job.error||"Submission failed");

    status.innerText="⏳ Transcribing (~30s for short videos)...";
    let result=null;
    for(let attempt=0;attempt<60;attempt++){
      await new Promise(r=>setTimeout(r,3000));
      const poll=await fetch("https://api.assemblyai.com/v2/transcript/"+job.id,{
        headers:{"Authorization":window.ASSEMBLYAI_CONFIG.API_KEY}
      });
      result=await poll.json();
      if(result.status==="completed") break;
      if(result.status==="error") throw new Error(result.error);
      status.innerText="⏳ Transcribing... ("+(attempt*3)+"s elapsed)";
    }
    if(!result || result.status!=="completed") throw new Error("Timed out");

    // Group words into sentence-level segments using utterances or words
    transcriptData=[];
    if(result.utterances && result.utterances.length){
      result.utterances.forEach(u=>transcriptData.push({time:u.start/1000,text:u.text}));
    } else if(result.words && result.words.length){
      // chunk words into ~10-word groups
      const words=result.words;
      let chunk=[],startT=words[0].start/1000;
      words.forEach((w,idx)=>{
        chunk.push(w.text);
        if(chunk.length>=10 || idx===words.length-1){
          transcriptData.push({time:startT,text:chunk.join(" ")});
          chunk=[];
          if(idx<words.length-1) startT=words[idx+1].start/1000;
        }
      });
    } else {
      transcriptData=[{time:0,text:result.text||"(no text)"}];
    }
    renderTranscript();
    status.innerText="✅ AssemblyAI transcript ready ("+transcriptData.length+" segments).";
  }catch(err){
    console.error(err);
    status.innerHTML='<span class="upload-error">❌ '+err.message+'</span>';
  }
}

async function assemblyUploadFile(file){
  const res=await fetch("https://api.assemblyai.com/v2/upload",{
    method:"POST",
    headers:{"Authorization":window.ASSEMBLYAI_CONFIG.API_KEY},
    body:file
  });
  const data=await res.json();
  if(!data.upload_url) throw new Error("Upload to AssemblyAI failed");
  return data.upload_url;
}

/* 🌐 Browser Speech (live recording fallback) */
function toggleRecording(){
  if(isRecording){ stopRecording(); }else{ startRecording(); }
}

function startRecording(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ alert("Speech recognition not supported. Use Chrome/Edge."); return; }
  if(!builderPlayer){ alert("Please load a video first."); return; }
  recognition=new SR();
  recognition.continuous=true;
  recognition.interimResults=false;
  recognition.lang="en-US";
  recognition.onresult=(event)=>{
    for(let i=event.resultIndex;i<event.results.length;i++){
      if(event.results[i].isFinal){
        const text=event.results[i][0].transcript.trim();
        const t=getTime();
        transcriptData.push({time:t,text:text});
        renderTranscript();
      }
    }
  };
  recognition.onerror=(e)=>{ document.getElementById("transcriptStatus").innerText="⚠️ "+e.error; };
  recognition.onend=()=>{ if(isRecording){ try{ recognition.start(); }catch(e){} } };
  try{
    recognition.start();
    isRecording=true;
    const btn=document.getElementById("recBtn");
    btn.innerHTML='<span class="recording-dot"></span>Stop Live Transcribe';
    btn.style.background="#dc2626";
    document.getElementById("transcriptStatus").innerText="🔴 Recording... play the video aloud.";
  }catch(err){ alert("Could not start: "+err.message); }
}

function stopRecording(){
  isRecording=false;
  if(recognition){ try{ recognition.stop(); }catch(e){} }
  const btn=document.getElementById("recBtn");
  btn.innerHTML="🎙️ Start Live Transcribe";
  btn.style.background="#4f46e5";
  document.getElementById("transcriptStatus").innerText="✅ Stopped.";
}

function addManualStamp(){
  if(!builderPlayer){ alert("Load a video first."); return; }
  const t=getTime();
  const note=prompt("Add a label for timestamp "+formatTime(t)+":","");
  if(note===null) return;
  transcriptData.push({time:t,text:note||"(marker)"});
  transcriptData.sort((a,b)=>a.time-b.time);
  renderTranscript();
}

function clearTranscript(){
  if(transcriptData.length && !confirm("Clear all transcript entries?")) return;
  transcriptData=[];
  renderTranscript();
}

function exportTranscript(){
  if(!transcriptData.length){ alert("No transcript to export."); return; }
  const txt=transcriptData.map(t=>"["+formatTime(t.time)+"] "+t.text).join("\n");
  const blob=new Blob([txt],{type:"text/plain"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download="transcript.txt"; a.click();
  URL.revokeObjectURL(url);
}

function renderTranscript(){
  const out=document.getElementById("transcriptOutput");
  if(!out) return;
  if(!transcriptData.length){
    out.innerHTML='<i style="color:#9ca3af;">No transcript yet.</i>';
    return;
  }
  out.innerHTML=transcriptData.map((entry,idx)=>{
    const words=entry.text.split(/\s+/).map(w=>
      '<span class="transcript-word" onclick="useWordTime('+entry.time+')">'+escapeHtml(w)+'</span>'
    ).join(" ");
    return '<div class="transcript-line">'+
      '<span class="transcript-time" onclick="seekTo('+entry.time+')">'+formatTime(entry.time)+'</span> '+
      words+
      ' <button style="padding:1px 6px;font-size:11px;margin-left:6px;background:#10b981;" onclick="useStampForSection('+entry.time+',\'start\')">→ Start</button>'+
      ' <button style="padding:1px 6px;font-size:11px;background:#f59e0b;" onclick="useStampForSection('+entry.time+',\'end\')">→ End</button>'+
      ' <button style="padding:1px 6px;font-size:11px;background:#ef4444;" onclick="removeTranscriptEntry('+idx+')">✕</button>'+
    '</div>';
  }).join("");
}

function escapeHtml(s){
  return s.replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function useWordTime(time){ seekTo(time); }
function removeTranscriptEntry(idx){ transcriptData.splice(idx,1); renderTranscript(); }

function useStampForSection(time,which){
  const sections=document.querySelectorAll(".section-builder");
  if(!sections.length){ alert("Add a section first."); return; }
  const target=sections[sections.length-1];
  target.querySelector("."+which).value=Math.floor(time);
  target.scrollIntoView({behavior:"smooth",block:"center"});
  target.style.outline="2px solid #10b981";
  setTimeout(()=>target.style.outline="",1200);
}

function addSection(data){
  data=data||{};
  const div=document.createElement("div");
  div.className="section-builder";
  div.innerHTML=
    '<div class="field-instruction">Enter text. Use _ for gaps.</div>'+
    '<textarea class="text">'+(data.text||"")+'</textarea>'+
    '<div class="field-instruction">Answers (comma separated)</div>'+
    '<input class="answers" value="'+((data.answers||[]).join(","))+'">'+
    '<div class="gap-warning"></div>'+
    '<div class="gap-preview"></div>'+
    '<div class="field-instruction">Start time</div>'+
    '<input class="start" value="'+(data.start||0)+'">'+
    '<button onclick="setStart(this)">Set Start</button>'+
    '<div class="field-instruction">End time</div>'+
    '<input class="end" value="'+(data.end||0)+'">'+
    '<button onclick="setEnd(this)">Set End</button>'+
    '<button style="background:#ef4444;" onclick="this.parentElement.remove()">🗑️ Remove Section</button>';
  const textarea=div.querySelector(".text");
  const answers=div.querySelector(".answers");
  textarea.addEventListener("input",()=>validateSection(div));
  answers.addEventListener("input",()=>validateSection(div));
  document.getElementById("sections").appendChild(div);
  validateSection(div);
}

function setStart(btn){ btn.parentElement.querySelector(".start").value=Math.floor(getTime()); }
function setEnd(btn){ btn.parentElement.querySelector(".end").value=Math.floor(getTime()); }
